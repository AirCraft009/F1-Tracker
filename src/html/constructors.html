<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constructor Standings — F1 Tracker 2026</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/constructors.css">
    <link rel="stylesheet" href="../css/filter.css">
</head>
<body>

<header class="site-header">
    <div class="header-inner">
        <a href="../../index.html" class="logo">
            <svg class="logo-mark" viewBox="0 0 42 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="42" height="28" rx="2" fill="#E8002D"/>
                <text x="5" y="20" font-family="Barlow Condensed, sans-serif" font-weight="900" font-size="17" fill="white" letter-spacing="1">F1</text>
                <polygon points="28,7 38,7 38,21 28,21 33,14" fill="white"/>
            </svg>
            <span class="logo-text">F<span>1</span> Tracker</span>
        </a>
        <nav class="site-nav">
            <a href="../../index.html" class="nav-link">Home</a>
            <a href="drivers.html"       class="nav-link">Drivers</a>
            <a href="constructors.html"  class="nav-link active">Constructors</a>
            <a href="results.html"       class="nav-link">Results</a>
        </nav>
        <div class="season-badge">2026 Season</div>
    </div>
</header>

<div class="page-hero">
    <h1>Constructors' Championship Standings · 2026</h1>
</div>

<main class="container">

    <div class="section-title">Championship <span>Leader</span></div>

    <!-- Leader banner — populated by constructorSetup.ts: buildLeaderBanner() -->
    <div id="leader-banner"></div>

    <!-- Constructor cards — populated by constructorSetup.ts: buildConstructorCard() -->
    <div class="section-title">All <span>Constructors</span></div>

    <div id="constructors-grid" class="constructors-grid"></div>

    <!-- Full standings table — populated by constructorSetup.ts: buildTableRow() -->
    <div class="table-wrap">
        <div class="table-header">
            <h3>Constructor Rankings Summary</h3>
            <span class="updated-badge">Live</span>
        </div>

        <table class="standings-table">
            <thead>
            <tr>
                <th style="width:40px">Pos</th>
                <th>Constructor</th>
                <th>Nat</th>
                <th>Drivers</th>
                <th class="pts">Pts</th>
                <th>Gap</th>
            </tr>
            </thead>
            <tbody id="full-standing-top">
            <!-- rows injected by buildTableRow() -->
            </tbody>
        </table>
    </div>

</main>

<footer class="site-footer">
    F1 Tracker · 2026 FIA Formula 1 World Championship · Constructors' Standings
</footer>

<script type="module" src="../constructorMain.ts"></script>
</body>
</html>
